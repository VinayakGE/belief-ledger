name: Ledger Cycle

on:
  # Scheduler disabled: Reference Experiment 001 complete at Run 175 (2026-07-08).
  # Workflow preserved so the experiment can be restarted under identical conditions.
  workflow_dispatch:

jobs:
  cycle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.8'
      - name: Commit belief
        run: python3 agent.py commit
      - name: Observe measurement
        run: python3 agent.py observe
      - name: Push ledger
        run: |
          git config user.name "belief-ledger-bot"
          git config user.email "noreply@github.com"
          git add ledger.jsonl
          git commit -m "Ledger cycle $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || true
          git push
